<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Страница не найдена — ReAge</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        background: #0b0d12;
        color: #e6e8ec;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .wrap { max-width: 480px; text-align: center; }
      .code {
        font-size: 96px;
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
        background: linear-gradient(180deg, #ffffff 0%, #8a8f99 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 12px;
      }
      p {
        font-size: 15px;
        line-height: 1.5;
        color: #9aa0a6;
        margin: 0 0 24px;
      }
      a.btn {
        display: inline-block;
        padding: 12px 22px;
        background: #ffffff;
        color: #0b0d12;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 15px;
        transition: opacity 0.15s ease;
      }
      a.btn:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="code">404</div>
      <h1>Страница не найдена</h1>
      <p>Возможно, ссылка устарела или адрес введён с ошибкой. Вернитесь на главную ReAge.</p>
      <a class="btn" href="/">На главную</a>
    </main>
  </body>
</html>
