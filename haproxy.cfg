global
    log stdout format raw local0
    maxconn 4096

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    http-reuse safe

    timeout connect 10s
    timeout client  60s
    timeout server  60s
    timeout http-request    15s
    timeout http-keep-alive 30s
    timeout tunnel 1h

# Public DNS resolvers — заставляют HAProxy периодически перерезолвить
# A-записи Supabase (за Cloudflare IP ротируются). Без этого блока haproxy
# кэширует IP при старте навсегда и через какое-то время висит до timeout server.
resolvers public_dns
    nameserver cf1 1.1.1.1:53
    nameserver cf2 1.0.0.1:53
    nameserver g1  8.8.8.8:53
    resolve_retries 3
    timeout resolve 2s
    timeout retry   1s
    hold valid    30s
    hold other    10s
    hold refused  10s
    hold nx       10s
    hold timeout   5s

frontend http_in
    bind *:80
    http-request set-header X-Forwarded-Proto https if { ssl_fc }

    acl host_api hdr(host) -i api-test.reage.life
    use_backend supabase_backend if host_api

    default_backend react_frontend

backend react_frontend
    server frontend 127.0.0.1:8080 check inter 5s

backend supabase_backend
    # Supabase ждёт правильный SNI/Host
    http-request set-header Host ilxgodhosirhhkffqryw.supabase.co

    # Health-check: если апстрим мёртв — быстро возвращаем 503,
    # а не висим до timeout server.
    option httpchk GET /
    http-check send hdr Host ilxgodhosirhhkffqryw.supabase.co

    server supabase ilxgodhosirhhkffqryw.supabase.co:443 \
        ssl sni str(ilxgodhosirhhkffqryw.supabase.co) verify none \
        resolvers public_dns init-addr none \
        check inter 10s fall 3 rise 2
