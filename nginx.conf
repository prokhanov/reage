server {
    listen 80;
    server_name _;
 
    root /usr/share/nginx/html;
    index index.html;

    location /supabase/realtime/ {
        proxy_pass https://ilxgodhosirhhkffqryw.supabase.co/realtime/;

        proxy_http_version 1.1;
        proxy_ssl_server_name on;

        proxy_set_header Host ilxgodhosirhhkffqryw.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    location /supabase/ {
        proxy_pass https://ilxgodhosirhhkffqryw.supabase.co/;

        proxy_http_version 1.1;
        proxy_ssl_server_name on;

        proxy_set_header Host ilxgodhosirhhkffqryw.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Accept $http_accept;
        proxy_set_header Accept-Encoding $http_accept_encoding;
        proxy_set_header Accept-Profile $http_accept_profile;
        proxy_set_header Content-Profile $http_content_profile;
        proxy_set_header Prefer $http_prefer;
        proxy_set_header Range $http_range;
        proxy_set_header If-None-Match $http_if_none_match;
        proxy_set_header x-client-info $http_x_client_info;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Большие ответы PostgREST (отчёты могут быть >800 КБ).
        # Отключаем буферизацию, чтобы middlebox'ы / провайдеры без VPN
        # не обрывали долгие/крупные ответы.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        client_max_body_size 50m;
        proxy_buffers 16 64k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
