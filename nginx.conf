# DNS resolver для динамических апстримов (Supabase за CloudFlare Anycast — IP меняются).
resolver 1.1.1.1 8.8.8.8 valid=60s ipv6=off;
resolver_timeout 5s;

# Пул keepalive-соединений к Supabase. Без него на каждый запрос
# открывается новый TCP+TLS handshake (+50-300 мс), и параллельные
# запросы выстраиваются в очередь на handshake — отсюда 12с на /analyses/.
upstream supabase_backend {
    server ilxgodhosirhhkffqryw.supabase.co:443;
    keepalive 64;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

upstream supabase_realtime_backend {
    server ilxgodhosirhhkffqryw.supabase.co:443;
    keepalive 16;
    keepalive_timeout 3600s;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /supabase/realtime/ {
        proxy_pass https://supabase_realtime_backend/realtime/;

        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ilxgodhosirhhkffqryw.supabase.co;
        proxy_ssl_session_reuse on;

        proxy_set_header Host ilxgodhosirhhkffqryw.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    location /supabase/ {
        proxy_pass https://supabase_backend/;

        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ilxgodhosirhhkffqryw.supabase.co;
        proxy_ssl_session_reuse on;

        # Критично для keepalive: затираем клиентский Connection: close,
        # иначе nginx закрывает upstream-соединение после каждого запроса.
        proxy_set_header Connection "";

        proxy_set_header Host ilxgodhosirhhkffqryw.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Content-Type $content_type;
        # Safari + nginx reverse proxy + br/gzip плохо дружат:
        # форсируем identity, чтобы апстрим Supabase не присылал сжатые тела.
        proxy_set_header Accept-Encoding "";
        gzip off;
        proxy_set_header Accept-Profile $http_accept_profile;
        proxy_set_header Content-Profile $http_content_profile;
        proxy_set_header Prefer $http_prefer;
        proxy_set_header Range $http_range;
        proxy_set_header If-None-Match $http_if_none_match;
        proxy_set_header x-client-info $http_x_client_info;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Большие ответы PostgREST (отчёты могут быть >800 КБ).
        # Отключаем буферизацию И chunked: PostgREST отдаёт Content-Length,
        # а Safari через прокси иногда не дочитывает chunked поток.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        client_max_body_size 50m;
        proxy_buffers 16 64k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
