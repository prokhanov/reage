server {
    listen 80;
    server_name api-test.reage.life;

    location / {
        proxy_pass https://ilxgodhosirhhkffqryw.supabase.co/;

        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ilxgodhosirhhkffqryw.supabase.co;
        proxy_ssl_session_reuse on;

        proxy_set_header Host ilxgodhosirhhkffqryw.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Accept $http_accept;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Prefer $http_prefer;
        proxy_set_header x-client-info $http_x_client_info;

        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;

        client_max_body_size 50m;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
