# reage-report-renderer — Playwright-сервис для генерации PDF.
#
# Стратегия деплоя: руками, из локальной машины оператора.
#   cd deploy/report-renderer
#   fly deploy -a reage-report-renderer
#
# Никаких секретов кроме AUTH_TOKEN; PREVIEW_BASE_URL хранится на стороне
# Lovable (edge-функция сама формирует URL превью и присылает его в теле
# запроса). Здесь URL приходит извне — сервис никуда сам не ходит.

app = "reage-report-renderer"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  REPORT_READY_TIMEOUT_MS = "40000"
  # NAV_TIMEOUT_MS = "60000"   # опциональный override, если долго грузится
  # PDF_TIMEOUT_MS = "60000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

# Chromium любит память. 1 CPU + 1 GB хватает на A4 без графиков-тяжеловесов,
# при первых зависаниях увеличивай до shared-cpu-2x + 2048.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
