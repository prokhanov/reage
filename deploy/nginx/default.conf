# nginx-конфиг для боевого reage.life (сборка через Coolify/Docker).
#
# ВАЖНО: whitelist SPA-маршрутов должен соответствовать src/App.tsx.
# При добавлении/переименовании/удалении роута во фронте — обнови этот файл.
# Несуществующие пути должны возвращать HTTP 404 (требование Яндекса),
# а не 200 с index.html.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/mime.types;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Vite-ассеты: иммутабельный кеш, если файла нет — 404
    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Корневые статические файлы (favicon, robots, sitemap, manifest и т.п.)
    location ~* ^/(robots\.txt|sitemap\.xml|llms\.txt|site\.webmanifest|favicon\.ico|placeholder\.svg|404\.html)$ {
        try_files $uri =404;
    }

    # Любые файлы с расширением (картинки и пр.) — отдаём как есть, иначе 404
    location ~* \.(png|jpg|jpeg|webp|gif|svg|ico|txt|xml|json|webmanifest|woff2?|ttf|otf|map)$ {
        try_files $uri =404;
    }

    # index.html не кешируем — иначе старая версия будет звать удалённые /assets/*
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        try_files /index.html =404;
    }

    # ===== Whitelist SPA-маршрутов из src/App.tsx -> index.html (200) =====
    location = /                  { try_files /index.html =404; }
    location = /auth              { try_files /index.html =404; }
    location = /register          { try_files /index.html =404; }
    location = /register-staff    { try_files /index.html =404; }
    location = /reset-password    { try_files /index.html =404; }
    location = /onboarding        { try_files /index.html =404; }
    location = /example-report    { try_files /index.html =404; }
    location = /prep              { try_files /index.html =404; }
    location = /unsubscribe       { try_files /index.html =404; }
    location = /dashboard         { try_files /index.html =404; }
    location = /health-strategy   { try_files /index.html =404; }
    location = /profile           { try_files /index.html =404; }
    location = /analyses          { try_files /index.html =404; }
    location ^~ /analyses/        { try_files /index.html =404; }
    location = /biomarkers        { try_files /index.html =404; }
    location = /recommendations   { try_files /index.html =404; }
    location = /prescriptions     { try_files /index.html =404; }
    location = /prescriptions-v2  { try_files /index.html =404; }
    location = /trends            { try_files /index.html =404; }
    location = /my-state          { try_files /index.html =404; }
    location = /health-assistant  { try_files /index.html =404; }
    location = /subscription            { try_files /index.html =404; }
    location = /subscription/success    { try_files /index.html =404; }
    location = /subscription/fail       { try_files /index.html =404; }
    location = /admin                   { try_files /index.html =404; }
    location ^~ /admin/                 { try_files /index.html =404; }
    location ^~ /legal/                 { try_files /index.html =404; }
    location = /compliance              { try_files /index.html =404; }

    # Всё остальное — настоящий 404 с кастомной HTML-страницей
    location / {
        return 404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Cache-Control "no-store";
    }
}
